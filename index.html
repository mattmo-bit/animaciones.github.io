<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./assets/style.css">
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="grid-container">
    <header class="navbar">
      <div class="logo">
        <img src="./assets/img/logo.png" alt="Logo Astra Militarum">
        <a>Astra Militarum</a>
      </div>
      
      <input type="checkbox" id="menu-checkbox" class="menu-checkbox">
      <label for="menu-checkbox" class="menu-toggle" aria-label="Abrir menú">
        ☰
      </label>

      <div class="nav-menu">
        <nav class="nav-links">
          <a>Inicio</a>
          <a>Servicios</a>
          <a>Contacto</a>
        </nav>

        <div class="nav-botones">
          <button class="btn-login">Iniciar Sesión</button>
          <button class="btn-signup">Registrarse</button>
        </div>
      </div>
    </header>

    <main>
      <div class="card1">
        <img src="./assets/img/hydra.jpg" class="img" alt="Hydra">
        <h2>Artilleria: <br>Hydra</h2>
        <p>$19.990</p>
        <button class="button">Comprar</button>
      </div>
      <div class="card2">
        <img src="./assets/img/lemanruss.jpg" class="img" alt="Leman Russ">
        <h2>Tanque de apoyo: Leman Russ</h2>
        <p>$29.990</p>
        <button class="button">Comprar</button>
      </div>
      <div class="card3">
        <img src="./assets/img/baneblade.jpg" class="img" alt="Bane Blade">
        <h2>Tanque Pesado: Bane Blade</h2>
        <p>$39.990</p>
        <button class="button">Comprar</button>
      </div>
      <div class="card4">
        <img src="./assets/img/rogaldorn.jpg" class="img" alt="Rogal Dorn">
        <h2>Tanque de Apoyo: Rogal Dorn</h2>
        <p>$29.990</p>
        <button class="button">Comprar</button>
      </div>
    </main>

    <footer class="footer"> 
      <p>Instagram: ://instagram.com</p>
      <p>TikTok: ://instagram.com</p>
    </footer>
  </div>
</body>
